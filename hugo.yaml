title: MEDDAH Mohamed
baseURL: https://meddah.systems
theme: hugo-theme-stack

params:
    favicon: /favicon.ico
    mainSections:
        - post
        - offensive
        - infrastructure
    featuredImageField: image
    rssFullContent: true

    sidebar:
        emoji: 🛡️
        subtitle: Security & Networks Infrastructure Engineer
        avatar:
            enabled: true
            local: true
            src: img/avatar.png

    footer:
        copyright: MEDDAH Mohamed // Operational Security

    defaultTheme: dark

    article:
        headingAnchor: true
        toc: true
        readingTime: true
        license:
            enabled: false

    dateFormat:
        published: Jan 02, 2006
        lastUpdated: Jan 02, 2006 15:04 MST

    comments:
        enabled: false

menu:
    main:
        - identifier: about
          name: About
          url: /page/about/
          weight: 1
          params:
              icon: user
        - identifier: writeups
          name: Write-ups
          url: /post/offensive/
          weight: 2
          params:
              icon: messages
        - identifier: blog
          name: Blog
          url: /post/
          weight: 3
          params:
              icon: clock
        - identifier: resume
          name: Resume
          url: /page/resume/
          weight: 4
          params:
              icon: link
        - identifier: certs
          name: Certifications
          url: /page/certs/
          weight: 5
          params:
              icon: hash
        - identifier: archives
          name: Archives
          url: /page/archives/
          weight: 6
          params:
              icon: archives

markup:
  goldmark:
    renderer:
      unsafe: true
